<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Usuários - Central TI</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px;
            font-family: Arial, sans-serif;
            background-color: #f5f6f8;
            color: #222222;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px;
            background-color: #ffffff;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
        }

        .cabecalho {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            color: #2c3e50;
        }

        .botao-novo {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 4px;
            background-color: #2c3e50;
            color: #ffffff;
            text-decoration: none;
        }

        .botao-novo:hover {
            background-color: #1f2f3d;
        }

        .tabela-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #d4d4d4;
            text-align: left;
        }

        th {
            background-color: #2c3e50;
            color: #ffffff;
        }

        tbody tr:nth-child(even) {
            background-color: #f3f4f5;
        }

        tbody tr:hover {
            background-color: #e9edf0;
        }

        .ativo {
            font-weight: bold;
        }

        .sem-registros {
            padding: 25px;
            color: #666666;
            text-align: center;
        }

        @media (max-width: 700px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 20px;
            }

            .cabecalho {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="cabecalho">

        <h1>Cadastro de Usuários</h1>

        <a class="botao-novo"
           th:href="@{/usuarios/novo}">
            Novo Usuário
        </a>

    </div>

    <div class="tabela-container">

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Perfil</th>
                <th>Ativo</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="usuario : ${usuarios}">

                <td th:text="${usuario.id}">
                    1
                </td>

                <td th:text="${usuario.nome}">
                    Nome
                </td>

                <td th:text="${usuario.email}">
                    email@exemplo.com
                </td>

                <td th:text="${usuario.perfil != null
                        ? usuario.perfil.descricao
                        : 'Não definido'}">
                    Perfil
                </td>

                <td class="ativo"
                    th:text="${usuario.ativo != null and usuario.ativo
                        ? 'Sim'
                        : 'Não'}">
                    Sim
                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(usuarios)}">

                <td colspan="5"
                    class="sem-registros">
                    Nenhum usuário cadastrado.
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
